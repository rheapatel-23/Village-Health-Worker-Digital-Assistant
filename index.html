<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASHA Saathi - Digital Assistant</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="dot"></div>
            <span id="connection-status">Connected / ऑनलाइन</span>
        </div>

        <!-- Dynamic Header -->
        <header id="app-header" style="display: none;">
            <div class="header-logo">
                <i class="fas fa-briefcase-medical"></i>
                <span id="header-title">ASHA Saathi</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-left: auto; margin-right: 15px;">
                <button id="lang-toggle" class="btn btn-outline" style="padding: 4px 8px; font-size: 10px; border-radius: 8px;">हिंदी</button>
                <img src="https://ui-avatars.com/api/?name=Sunita+Devi&background=2D6A4F&color=fff" alt="Profile" class="profile-pic" id="profile-pic">
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected here by JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottom-nav" style="display: none;">
            <div class="nav-item active" data-view="dashboard">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" data-view="patients">
                <i class="fas fa-users"></i>
                <span>Patients</span>
            </div>
            <div class="nav-item" data-view="sync">
                <i class="fas fa-sync-alt"></i>
                <span>Sync</span>
            </div>
        </nav>
        <!-- Notification Toast -->
        <div id="toast" class="toast">
            <i class="fas fa-sms"></i>
            <span id="toast-message">Doctor alerted via SMS!</span>
        </div>

    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
