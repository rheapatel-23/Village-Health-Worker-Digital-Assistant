<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Alerts - AarogyaNet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-notes-medical"></i></div>
                <span class="brand-text">AarogyaNet</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="patients.html" class="nav-item"><i class="fa-solid fa-users"></i> Patients</a>
                <a href="alerts.html" class="nav-item active"><i class="fa-solid fa-bell"></i> Alerts</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="auth-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign In Account</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebarToggle" style="background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; padding: 4px;"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">Critical System Alerts</h1>
                </div>
            </header>
            <div class="content-wrapper">
                <div class="ai-glass-box" style="margin-bottom: 0;">
                    <div class="ai-icon-glow" style="background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                    <div class="ai-content">
                        <h3 style="background: none; color: #ef4444;">SMS Dispatch History</h3>
                        <p>Below are all the automated SMS dispatches generated by the system when a high-risk patient synced from an ASHA worker. <a href="settings.html">Configure Triggers &rarr;</a></p>
                    </div>
                </div>

                <div id="alertsList" style="display: flex; flex-direction: column; gap: 16px;">
                    <!-- Alerts dynamically injected by script.js -->
                </div>
            </div>
        </main>
    </div>
</body>
</html>
